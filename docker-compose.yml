
# ─────────────────────────────────────────
#  TaaSim — Urban Mobility Platform
#  ENSA Al Hoceima — Capstone 2025-2026
#  Docker Compose — tous les services
# ─────────────────────────────────────────

networks:
  taasim-net:
    driver: bridge

volumes:
  minio-data:
  cassandra-data:
  grafana-data:
  connect-data: 

services:

  # ─────────────────────────────
  #  1. APACHE KAFKA (KRaft mode — sans Zookeeper)
  # ─────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: taasim-kafka
    hostname: kafka
    ports:
      - "9092:9092"       # accès depuis la machine hôte
      - "9093:9093"       # controller KRaft interne
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168       # 7 jours de rétention
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: taasim-cluster-001
    networks:
      - taasim-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
  # ─────────────────────────────
#  INITIALISATION KAFKA (Topics)
# ─────────────────────────────
  # ─────────────────────────────
#  INITIALISATION KAFKA (Topics)
# ─────────────────────────────
  kafka-init:
    image: apache/kafka:3.7.0
    container_name: taasim-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    entrypoint: /bin/sh -c "echo '⏳ Attente du démarrage de Kafka...'; sleep 10; echo '📝 Création des topics Kafka...'; /opt/kafka/bin/kafka-topics.sh --create --topic raw.trips --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --if-not-exists; /opt/kafka/bin/kafka-topics.sh --create --topic raw.gps --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --if-not-exists; /opt/kafka/bin/kafka-topics.sh --create --topic processed.gps --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --if-not-exists; /opt/kafka/bin/kafka-topics.sh --create --topic processed.demand --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --if-not-exists; /opt/kafka/bin/kafka-topics.sh --create --topic processed.matches --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --if-not-exists; echo ''; echo '✅ Topics Kafka créés avec succès !'; echo ''; echo '📋 Liste des topics disponibles:'; /opt/kafka/bin/kafka-topics.sh --list --bootstrap-server kafka:9092; echo ''; echo '🏁 Initialisation terminée.'; exit 0;"
    networks:
      - taasim-net
    restart: "no"

  # ─────────────────────────────
  #  KAFKA CONNECT (avec installation auto du connecteur S3)
  # ─────────────────────────────
  kafka-connect:
    image: confluentinc/cp-kafka-connect-base:7.5.0
    container_name: taasim-kafka-connect
    hostname: kafka-connect
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: "taasim-connect-group"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_CONFIG_STORAGE_TOPIC: "connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "connect-status"
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
      KAFKA_HEAP_OPTS: "-Xms256M -Xmx512M"
    volumes:
      - connect-data:/var/lib/kafka-connect
    networks:
      - taasim-net
    command: >
      sh -c "
        echo '📦 Installation du connecteur S3...' &&
        confluent-hub install --no-prompt confluentinc/kafka-connect-s3:10.5.0 &&
        echo '✅ Connecteur installé, démarrage de Kafka Connect...' &&
        /etc/confluent/docker/run
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─────────────────────────────
  #  11. DÉPLOIEMENT AUTO DU CONNECTEUR S3
  # ─────────────────────────────
  kafka-connect-deploy:
    image: alpine/curl:latest
    container_name: taasim-kafka-connect-deploy
    depends_on:
      kafka-connect:
        condition: service_healthy
    volumes:
      - ./config/s3-sink-config.json:/config.json
      - ./scripts/deploy-connector.sh:/deploy.sh
    entrypoint: /bin/sh /deploy.sh
    networks:
      - taasim-net
    restart: "no"
  # ─────────────────────────────
  #  2. MINIO (Data Lake S3-compatible)
  # ─────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: taasim-minio
    hostname: minio
    ports:
      - "9000:9000"       # API S3
      - "9001:9001"       # Console web MinIO
    environment:
      MINIO_ROOT_USER: taasim
      MINIO_ROOT_PASSWORD: taasim123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - taasim-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Initialisation automatique des buckets MinIO
  minio-init:
    image: minio/mc:latest
    container_name: taasim-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 taasim taasim123;
        mc mb -p local/raw/kafka-archive;
        mc mb -p local/raw/nyc-tlc;
        mc mb -p local/raw/porto-trips;
        mc mb -p local/curated;
        mc mb -p local/machine-learning;
        echo 'Buckets MinIO créés avec succès';
      "
    networks:
      - taasim-net

  # ─────────────────────────────
  #  3. APACHE CASSANDRA
  # ─────────────────────────────
  cassandra:
    image: cassandra:4.1
    container_name: taasim-cassandra
    hostname: cassandra
    ports:
      - "9042:9042"       # CQL port
    environment:
      CASSANDRA_CLUSTER_NAME: TaaSimCluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: SimpleSnitch
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    volumes:
      - cassandra-data:/var/lib/cassandra
    networks:
      - taasim-net
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 10

  # Initialisation du keyspace et des tables Cassandra
  cassandra-init:
    image: cassandra:4.1
    container_name: taasim-cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./config/cassandra/init.cql:/init.cql
    entrypoint: >
      /bin/sh -c "
        echo 'Attente Cassandra...';
        sleep 10;
        cqlsh cassandra -f /init.cql;
        echo 'Schema Cassandra initialisé';
      "
    networks:
      - taasim-net

  # ─────────────────────────────
  #  4. APACHE FLINK
  # ─────────────────────────────
  flink-jobmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    container_name: taasim-flink-jobmanager
    hostname: flink-jobmanager
    ports:
      - "8081:8081"
    volumes:
      - ./data:/opt/flink/data
      - ./flink:/opt/flink/jobs    
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 8
        state.backend: rocksdb
        # CORRECTION : utiliser raw/kafka-archive au lieu de kafka-archive
        state.checkpoints.dir: s3://raw/kafka-archive/flink-checkpoints/
        s3.endpoint: http://minio:9000
        s3.access-key: taasim
        s3.secret-key: taasim123
        s3.path.style.access: true
        execution.checkpointing.interval: 60000
        # Désactiver SSL pour MinIO
        s3.connection.ssl.enabled: false
        # Configuration Hadoop S3A
        fs.s3a.endpoint: http://minio:9000
        fs.s3a.access.key: taasim
        fs.s3a.secret.key: taasim123
        fs.s3a.path.style.access: true
        fs.s3a.connection.ssl.enabled: false
        fs.s3a.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
    networks:
      - taasim-net

  flink-taskmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    container_name: taasim-flink-taskmanager
    hostname: flink-taskmanager
    depends_on:
      - flink-jobmanager
    volumes:
      - ./data:/opt/flink/data
      - ./flink:/opt/flink/jobs   
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 8
        state.backend: rocksdb
        # CORRECTION : utiliser raw/kafka-archive au lieu de kafka-archive
        state.checkpoints.dir: s3://raw/kafka-archive/flink-checkpoints/
        s3.endpoint: http://minio:9000
        s3.access-key: taasim
        s3.secret-key: taasim123
        s3.path.style.access: true
        execution.checkpointing.interval: 60000
        s3.connection.ssl.enabled: false
        fs.s3a.endpoint: http://minio:9000
        fs.s3a.access.key: taasim
        fs.s3a.secret.key: taasim123
        fs.s3a.path.style.access: true
        fs.s3a.connection.ssl.enabled: false
        fs.s3a.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
    networks:
      - taasim-net

  # ─────────────────────────────
  #  5. APACHE SPARK - AVEC DOCKERFILE
  # ─────────────────────────────
  # ─────────────────────────────
#  5. APACHE SPARK - AVEC WORKERS SCALABLES
# ─────────────────────────────
  spark-master:
    build: ./spark
    container_name: taasim-spark-master
    hostname: spark-master
    ports:
      - "8082:8080"
      - "7077:7077"
    volumes:
      - ./spark-jars:/opt/spark/jars/extras
      - ./spark/start-master.sh:/opt/spark/start-master.sh
      - ./requirements.txt:/tmp/requirements.txt
      - ./spark/python-packages:/home/spark/.local
    environment:
      SPARK_NO_DAEMONIZE: "true"
    command: ["/bin/bash", "/opt/spark/start-master.sh"]
    networks:
      - taasim-net
    user: root

# Worker 1
  spark-worker-1:
    image: apache/spark:3.4.1
    container_name: taasim-spark-worker-1
    depends_on:
      - spark-master
    volumes:
      - ./spark-jars:/opt/spark/jars/extras
      - ./spark/start-master.sh:/opt/spark/start-master.sh
      - ./spark/start-worker.sh:/opt/spark/start-worker.sh
      - ./requirements.txt:/tmp/requirements.txt
      - ./spark/python-packages:/home/spark/.local
    environment:
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_NO_DAEMONIZE: "true"
    command: ["/bin/bash", "/opt/spark/start-worker.sh"]
    networks:
      - taasim-net
    user: root

  # Worker 2 (ajoutez-en autant que nécessaire)
  spark-worker-2:
    image: apache/spark:3.4.1
    container_name: taasim-spark-worker-2
    profiles:
      - disabled
    depends_on:
      - spark-master
    volumes:
      - ./spark-jars:/opt/spark/jars/extras
      - ./spark/start-worker.sh:/opt/spark/start-worker.sh
      - ./requirements.txt:/tmp/requirements.txt
      - ./spark/python-packages:/home/spark/.local
    environment:
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    command: /bin/bash /opt/spark/start-worker.sh
    networks:
      - taasim-net
    user: root

  # Worker 3
  spark-worker-3:
    image: apache/spark:3.4.1
    container_name: taasim-spark-worker-3
    profiles:
      - disabled
    depends_on:
      - spark-master
    volumes:
      - ./spark-jars:/opt/spark/jars/extras
      - ./spark/start-worker.sh:/opt/spark/start-worker.sh
      - ./requirements.txt:/tmp/requirements.txt
      - ./spark/python-packages:/home/spark/.local
    environment:
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    command: /bin/bash /opt/spark/start-worker.sh
    networks:
      - taasim-net
    user: root
  # ─────────────────────────────
  #  6. JUPYTER (Notebooks Semaine 1)
  # ─────────────────────────────
  jupyter:
    image: jupyter/pyspark-notebook:spark-3.4.1
    container_name: taasim-jupyter
                          
    ports:
      - "8888:8888"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      GRANT_SUDO: "yes"                 # ← AJOUTER CETTE LIGNE
      NB_USER: "jovyan"                 # ← AJOUTER CETTE LIGNE
      CHOWN_HOME: "yes"                 # ← AJOUTER CETTE LIGNE
      SPARK_MASTER: spark://spark-master:7077
      AWS_ACCESS_KEY_ID: taasim
      AWS_SECRET_ACCESS_KEY: taasim123
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      PYSPARK_SUBMIT_ARGS: >
        --jars /home/jovyan/work/jars/* 
        --conf spark.hadoop.fs.s3a.endpoint=http://minio:9000
        --conf spark.hadoop.fs.s3a.access.key=taasim
        --conf spark.hadoop.fs.s3a.secret.key=taasim123
        --conf spark.hadoop.fs.s3a.path.style.access=true
        --conf spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
        pyspark-shell
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
      - ./data:/home/jovyan/work/data
      - ./spark-jobs:/home/jovyan/work/spark-jobs
      - ./producers:/home/jovyan/work/producers
      - ./flink:/home/jovyan/work/flink
      - ./requirements.txt:/home/jovyan/requirements.txt
      - ./spark-jars:/home/jovyan/work/jars
    networks:
      - taasim-net
    command: >
      sh -c "
        mkdir -p /home/jovyan/work/producers &&
        chmod -R 777 /home/jovyan/work/notebooks || true &&
        chmod -R 777 /home/jovyan/work/producers || true &&
        pip install --upgrade pip &&
        pip install -r /home/jovyan/requirements.txt &&
        start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''
      "

  # ─────────────────────────────
  #  7. GRAFANA (Dashboard)
  # ─────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: taasim-grafana
    ports:
      - "3000:3000"       # UI Grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: taasim123
      GF_INSTALL_PLUGINS: hadesarchitect-cassandra-datasource
      #GF_INSTALL_PLUGINS: gregl83-apache-cassandra-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/grafana/provisioning:/etc/grafana/provisioning 
    networks:
      - taasim-net

  # ─────────────────────────────
  #  8. FASTAPI (Semaine 6+)
  # ─────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: taasim-api
    ports:
      - "8000:8000"       # API REST
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CASSANDRA_HOST: cassandra
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: taasim
      MINIO_SECRET_KEY: taasim123
      JWT_SECRET_KEY: taasim-jwt-secret-change-in-prod
    depends_on:
      cassandra:
        condition: service_healthy
    networks:
      - taasim-net
    # Commenter ce service jusqu'à la Semaine 6
    profiles:
      - week6
